version: "3.9"

services:
  # ─── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: fraud_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fraud_detection
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MLflow ────────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: fraud_mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: mlflow ui --backend-store-uri postgresql://postgres:postgres@postgres:5432/mlflow_db --default-artifact-root /mlflow/artifacts
    environment:
      MLFLOW_TRACKING_URI: postgresql://postgres:postgres@postgres:5432/mlflow_db
    depends_on:
      postgres:
        condition: service_healthy

  # ─── API Server (FastAPI — ML Inference + Transactions + DB) ──────────────
  api:
    build:
      context: ./services/ml-serving
      dockerfile: Dockerfile
    container_name: fraud_api
    ports:
      - "8000:8000"
    volumes:
      - ./services/ml-serving/models:/app/models
      - ./data/processed:/app/data/processed
    environment:
      FRAUD_THRESHOLD: "0.5"
      MODEL_PATH: /app/models
      DATA_DIR: /app/data
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fraud_detection
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (Next.js) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: fraud_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

  # ─── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: fraud_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - api

  # ─── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.1.0
    container_name: fraud_grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
