name: fraud-detection

services:
  # ─── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: fraud_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fraud_detection
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MLflow ────────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: fraud_mlflow
    ports:
      - "5001:5000"
    volumes:
      - ./mlflow_artifacts:/app/mlflow_artifacts
      - ./data:/app/data
      - ./models:/app/models
    command: >-
      mlflow server
      --backend-store-uri postgresql://postgres:postgres@postgres:5432/mlflow_db
      --default-artifact-root /app/mlflow_artifacts
      --host 0.0.0.0
      --port 5000
      --allowed-hosts "*"
    environment:
      MLFLOW_TRACKING_URI: postgresql://postgres:postgres@postgres:5432/mlflow_db
    depends_on:
      postgres:
        condition: service_healthy

  # ─── API Server (FastAPI — ML Inference + Transactions + DB) ──────────────
  api:
    build:
      context: .
      dockerfile: services/ml-serving/Dockerfile
    container_name: fraud_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      FRAUD_THRESHOLD: "0.93"
      MODEL_PATH: /app/models
      DATA_DIR: /app/data
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fraud_detection
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_ARTIFACT_ROOT: /app/mlflow_artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (Next.js) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: fraud_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

  # ─── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: fraud_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      api:
        condition: service_healthy

  # ─── ML Pipeline (train model — runs once then exits) ──────────────────────
  ml-pipeline:
    build:
      context: .
      dockerfile: services/ml-pipeline/Dockerfile
    container_name: fraud_ml_pipeline
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./mlflow_artifacts:/app/mlflow_artifacts
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_ARTIFACT_ROOT: /app/mlflow_artifacts
    depends_on:
      mlflow:
        condition: service_healthy
    restart: "no"

  # ─── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.1.0
    container_name: fraud_grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

  # ─── Airflow ─────────────────────────────────────────────────────────────
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: fraud_airflow_webserver
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow_db
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - ./services/ml-pipeline:/opt/airflow/services/ml-pipeline
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: fraud_airflow_scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow_db
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - ./services/ml-pipeline:/opt/airflow/services/ml-pipeline
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
