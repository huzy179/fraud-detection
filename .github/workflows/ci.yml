name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  API_IMAGE: fraud-api
  FRONTEND_IMAGE: fraud-frontend

jobs:
  lint-and-test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      # ── Verify environments ─────────────────────────────────────────
      - name: Verify Python
        run: |
          python3 --version
          which python3

      - name: Verify Node
        run: |
          node --version
          npm --version
          which node

      # ── Python / ML Serving ────────────────────────────────────────
      - name: Create Python venv
        run: python3 -m venv .venv

      - name: Install Python deps
        run: |
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r services/ml-serving/requirements.txt

      - name: Lint Python
        run: |
          .venv/bin/pip install flake8
          .venv/bin/flake8 services/ml-serving/ \
            --max-line-length=120 \
            --extend-ignore=E302,E402,E501,E702,F401,F824,F841,W503

      - name: Test ML Serving
        run: |
          .venv/bin/pip install pytest httpx
          .venv/bin/pytest services/ml-serving/ -v

      # ── Frontend ───────────────────────────────────────────────────
      - name: Install & build frontend
        working-directory: ./services/frontend
        run: |
          npm ci
          npm run build

  docker-build:
    runs-on: self-hosted
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API Server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/ml-serving/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.API_IMAGE }}:latest

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          file: ./services/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.FRONTEND_IMAGE }}:latest