name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fraud_detection
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      # Python / ML Serving (FastAPI)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python deps
        run: |
          pip install -r services/ml-serving/requirements.txt

      - name: Lint Python
        run: |
          pip install flake8
          flake8 services/ml-serving/main.py --max-line-length=120 || true

      - name: Test ML Serving
        run: |
          pip install pytest httpx
          pytest services/ml-serving/ -v || true

      # Frontend
      - name: Install frontend deps
        working-directory: ./services/frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./services/frontend
        run: npm run build || true

  docker-build:
    runs-on: self-hosted
    needs: lint-and-test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build API Server Docker image
        run: |
          docker build -f services/ml-serving/Dockerfile \
            -t fraud-api:${{ github.sha }} \
            services/ml-serving/

      - name: Build Frontend Docker image
        run: |
          docker build -f services/frontend/Dockerfile \
            -t fraud-frontend:${{ github.sha }} \
            services/frontend/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push API Server image
        run: |
          docker tag fraud-api:${{ github.sha }} \
            ghcr.io/${{ github.repository }}/fraud-api:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/fraud-api:${{ github.sha }}
